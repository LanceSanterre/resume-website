<!DOCTYPE html>
<html>
<head>
    <title>{{ project.title }}</title>
</head>
<body>

    <a href="/projects">← Back to Projects</a>

    <h1>{{ project.title }}</h1>

    <p>{{ project.description }}</p>

    <h3>Tech Stack</h3>
    <ul>
        {% for tech in project.tech %}
            <li>{{ tech }}</li>
        {% endfor %}
    </ul>

    <h3>Highlights</h3>
    <ul>
        {% for item in project.highlights %}
            <li>{{ item }}</li>
        {% endfor %}
    </ul>

    {% if project.github %}
        <p>
            <a href="{{ project.github }}" target="_blank">
                View on GitHub
            </a>
        </p>
    {% endif %}

</body>
</html>
