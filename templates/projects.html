<!DOCTYPE html>
<html>
<head>
    <title>Projects</title>
</head>
<body>

    <h1>All Projects</h1>

    <a href="/">Home</a>

    <hr>

    {% for project in projects %}
        <div>
            <h2>{{ project.title }}</h2>
            <p>{{ project.description }}</p>

            <a href="/projects/{{ project.id }}">View Project</a>
        </div>
        <hr>
    {% endfor %}

</body>
</html>
