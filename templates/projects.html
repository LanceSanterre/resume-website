{% extends "base.html" %}

{% block content %}

<h2>All Projects</h2>

<div class="projects-grid">
    {% for project in projects %}
        <div class="project-card">
            <h4>{{ project.title }}</h4>
            <p>{{ project.summary }}</p>

            <div class="tech-stack">
                {% for tech in project.tech_images %}
                    <img src="{{ url_for('static', filename=tech.image) }}" title="{{ tech.name }}">
                {% endfor %}
            </div>

            <a class="btn" href="{{ url_for('project_detail', project_id=project.id) }}">
                View Project
            </a>
        </div>
    {% endfor %}
</div>

{% endblock %}
